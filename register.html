<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — 디지털 마에스트로</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#080808; --gold:#C9A84C; --gold-light:#E8C97A; --gold-dim:rgba(201,168,76,0.15); --white:#F5F0E8; --gray:#888; --border:rgba(201,168,76,0.2); --serif:'Nanum Gothic',sans-serif; --sans:'Noto Sans KR',sans-serif; }
    body { background:var(--black); color:var(--white); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:1; opacity:0.4; }
    nav { background:rgba(8,8,8,0.95); border-bottom:1px solid var(--border); padding:0 2.5rem; height:56px; display:flex; align-items:center; position:relative; z-index:10; }
    .nav-logo { font-family:var(--serif); font-size:15px; font-weight:700; color:var(--gold); text-decoration:none; letter-spacing:0.1em; }
    .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; position:relative; z-index:2; }
    .box { border:1px solid var(--border); background:rgba(201,168,76,0.04); padding:2.5rem; width:100%; max-width:400px; }
    .box-label { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:1.5rem; display:flex; align-items:center; gap:8px; }
    .box-label::before { content:''; display:block; width:16px; height:1px; background:var(--gold); }
    .box-title { font-family:var(--serif); font-size:28px; font-weight:700; margin-bottom:0.5rem; }
    .box-sub { font-size:13px; color:var(--gray); margin-bottom:2rem; }
    label { display:block; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--gray); margin-bottom:6px; }
    input { width:100%; padding:11px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--white); font-size:14px; font-family:var(--sans); outline:none; margin-bottom:1.25rem; transition:border-color 0.2s; }
    input:focus { border-color:var(--gold); background:rgba(201,168,76,0.05); }
    input::placeholder { color:rgba(245,240,232,0.2); }
    .btn { width:100%; padding:13px; background:var(--gold); color:var(--black); border:none; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; font-family:var(--sans); cursor:pointer; transition:background 0.2s; margin-bottom:1rem; }
    .btn:hover { background:var(--gold-light); }
    .link-row { text-align:center; font-size:12px; color:var(--gray); }
    .link-row a { color:var(--gold); text-decoration:none; }
    .error { font-size:12px; color:#e74c3c; margin-bottom:1rem; display:none; }
    .success { font-size:13px; color:#2ecc71; margin-bottom:1rem; display:none; text-align:center; padding:1rem; border:1px solid rgba(46,204,113,0.3); background:rgba(46,204,113,0.05); }
  </style>
</head>
<body>
<nav><a href="/" class="nav-logo">디지털 마에스트로</a></nav>
<div class="wrap">
  <div class="box">
    <p class="box-label">회원가입</p>
    <h1 class="box-title">시작하세요</h1>
    <p class="box-sub">계정을 만들고 강의를 시작해보세요.</p>
    <p class="error" id="error-msg">오류가 발생했습니다. 다시 시도해주세요.</p>
    <p class="success" id="success-msg">✓ 가입 완료! 이메일을 확인해주세요.</p>
    <label>이름</label>
    <input type="text" id="name" placeholder="홍길동" />
    <label>이메일</label>
    <input type="email" id="email" placeholder="example@email.com" />
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="8자 이상" />
    <button class="btn" onclick="doRegister()">회원가입</button>
    <p class="link-row">이미 계정이 있으신가요? <a href="/login">로그인</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const _supabase = createClient('https://vdgpsejiagxnrilcnqag.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkZ3BzZWpsYWd4bnJpbGNucWFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDE2MTIsImV4cCI6MjA5NTkxNzYxMn0.YU_fHHh_UZ0MQLLlRPXr-ZNz5vq2Xb9TbK5iH7Q9BHg');
  async function doRegister() {
    const err = document.getElementById('error-msg');
    const suc = document.getElementById('success-msg');
    err.style.display = 'none'; suc.style.display = 'none';
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('pw').value;
    if (!name || !email || !pw) { err.textContent = '모든 항목을 입력해주세요.'; err.style.display = 'block'; return; }
    const { error } = await _supabase.auth.signUp({ email, password: pw, options: { data: { name } } });
    if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
    suc.style.display = 'block';
    setTimeout(() => window.location.href = '/login', 2000);
  }
</script>
</body>
</html>
