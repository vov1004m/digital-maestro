<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — 디지털 마에스트로</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8;
      --bg-card: #ffffff;
      --bg-muted: #f4f3f0;
      --text: #1a1a18;
      --text-2: #5a5a56;
      --text-3: #9a9a94;
      --border: rgba(26,26,24,0.1);
      --border-2: rgba(26,26,24,0.18);
      --teal: #0f6e56;
      --teal-light: #e1f5ee;
      --red: #c0392b;
      --red-light: #fdecea;
      --sans: 'Noto Sans KR', sans-serif;
      --radius: 10px;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
    }
    .nav-login {
      font-size: 13px;
      color: var(--text-2);
      text-decoration: none;
    }
    .nav-login:hover { color: var(--text); }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
    }
    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .card-title {
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }
    .card-sub {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 2rem;
      line-height: 1.7;
    }
    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--text);
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--teal); }
    input::placeholder { color: var(--text-3); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--text);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.8; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--text-3);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }

    .login-link {
      text-align: center;
      font-size: 13px;
      color: var(--text-2);
      margin-top: 1.5rem;
    }
    .login-link a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .login-link a:hover { text-decoration: underline; }

    .alert {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 1.25rem;
      display: none;
      line-height: 1.6;
    }
    .alert.error {
      background: var(--red-light);
      color: var(--red);
      border: 0.5px solid rgba(192,57,43,0.2);
      display: block;
    }
    .alert.success {
      background: var(--teal-light);
      color: var(--teal);
      border: 0.5px solid rgba(15,110,86,0.2);
      display: block;
    }

    footer {
      border-top: 0.5px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
    }
    footer p { font-size: 12px; color: var(--text-3); }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">디지털 마에스트로</a>
    <a href="/login.html" class="nav-login">이미 계정이 있으신가요? 로그인</a>
  </nav>

  <div class="main">
    <div class="card">
      <div class="card-title">회원가입</div>
      <div class="card-sub">계정을 만들고 강의를 시작하세요.</div>

      <div id="alert" class="alert"></div>

      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="8자 이상 입력해주세요" />
      </div>
      <div class="form-group">
        <label for="password-confirm">비밀번호 확인</label>
        <input type="password" id="password-confirm" placeholder="비밀번호를 다시 입력해주세요" />
      </div>

      <button class="btn-submit" id="submit-btn" onclick="handleRegister()">회원가입</button>

      <div class="login-link">
        이미 계정이 있으신가요? <a href="/login.html">로그인</a>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 디지털 마에스트로 · 민병현</p>
  </footer>

  <script>
    // ↓ 여기에 Supabase 정보를 입력하세요
    const SUPABASE_URL = 'https://vdgpsejlagxnrilcnqag.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_czh60ItKuAVBkj3TAFBKXw_-Kz2QseH'
    // ↑ YOUR_PUBLISHABLE_KEY_HERE 를 실제 키로 교체하세요

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_KEY)

    function showAlert(message, type) {
      const alert = document.getElementById('alert')
      alert.textContent = message
      alert.className = `alert ${type}`
    }

    async function handleRegister() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const passwordConfirm = document.getElementById('password-confirm').value
      const btn = document.getElementById('submit-btn')

      if (!name || !email || !password) {
        showAlert('모든 항목을 입력해주세요.', 'error')
        return
      }
      if (password.length < 8) {
        showAlert('비밀번호는 8자 이상이어야 합니다.', 'error')
        return
      }
      if (password !== passwordConfirm) {
        showAlert('비밀번호가 일치하지 않습니다.', 'error')
        return
      }

      btn.disabled = true
      btn.textContent = '가입 중...'

      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: { data: { name } }
      })

      if (error) {
        showAlert('가입 중 오류가 발생했습니다: ' + error.message, 'error')
        btn.disabled = false
        btn.textContent = '회원가입'
        return
      }

      // 프로필 저장
      await client.from('profiles').insert({
        id: data.user.id,
        email,
        name
      })

      showAlert('가입이 완료됐어요! 이메일을 확인하고 인증 링크를 클릭해주세요.', 'success')
      btn.textContent = '완료'
    }
  </script>

</body>
</html>
