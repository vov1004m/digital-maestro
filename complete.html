<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 — 디지털 마에스트로</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --gold: #C9A84C; --gold-light: #E8C97A;
      --gold-dim: rgba(201,168,76,0.15); --white: #F5F0E8; --gray: #888;
      --border: rgba(201,168,76,0.2);
      --serif: 'Nanum Gothic', sans-serif; --sans: 'Noto Sans KR', sans-serif;
    }
    body { background: var(--black); color: var(--white); font-family: var(--sans); font-size: 16px; line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1; opacity: 0.4; }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(8,8,8,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2.5rem; height: 56px; display: flex; align-items: center; }
    .nav-logo { font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--gold); text-decoration: none; letter-spacing: 0.1em; }

    .page { max-width: 520px; margin: 0 auto; padding: 4rem 1.5rem 5rem; text-align: center; position: relative; z-index: 2; }

    /* 체크 아이콘 */
    .check-wrap {
      width: 80px; height: 80px; margin: 0 auto 2rem;
      border: 1px solid var(--border); background: var(--gold-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
    }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .complete-title { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--gold); margin-bottom: 0.75rem; animation: fadeUp 0.5s 0.2s ease both; }
    .complete-sub { font-size: 14px; color: var(--gray); line-height: 1.85; margin-bottom: 2.5rem; animation: fadeUp 0.5s 0.3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* 영수증 */
    .receipt { border: 1px solid var(--border); background: rgba(201,168,76,0.04); padding: 1.5rem; text-align: left; margin-bottom: 2rem; animation: fadeUp 0.5s 0.4s ease both; }
    .receipt-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    .receipt-label::before { content: ''; display: block; width: 16px; height: 1px; background: var(--gold); }
    .receipt-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); padding: 6px 0; border-bottom: 1px solid rgba(201,168,76,0.1); }
    .receipt-row:last-child { border-bottom: none; }
    .receipt-row strong { color: var(--white); font-weight: 700; }

    /* 안내 박스 */
    .info-box { border: 1px solid var(--border); background: var(--gold-dim); padding: 1rem 1.25rem; text-align: left; margin-bottom: 2.5rem; display: flex; gap: 10px; animation: fadeUp 0.5s 0.5s ease both; }
    .info-box span { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
    .info-box p { font-size: 13px; color: rgba(245,240,232,0.7); line-height: 1.7; }

    /* 버튼 */
    .btn-primary {
      display: block; width: 100%; padding: 14px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      background: var(--gold); color: var(--black); border: none; cursor: pointer;
      font-family: var(--sans); text-decoration: none; margin-bottom: 10px;
      position: relative; overflow: hidden; transition: opacity 0.2s;
      animation: fadeUp 0.5s 0.55s ease both;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      display: block; width: 100%; padding: 13px; font-size: 13px;
      color: var(--gray); background: transparent; border: 1px solid var(--border);
      cursor: pointer; font-family: var(--sans); text-decoration: none;
      transition: all 0.2s; animation: fadeUp 0.5s 0.6s ease both;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">디지털 마에스트로</a>
</nav>

<div class="page">
  <div class="check-wrap">✓</div>

  <p class="complete-title">결제가 완료되었습니다</p>
  <p class="complete-sub">디지털 마에스트로 수강 신청이 확정되었어요.<br>입력하신 이메일로 강의 링크를 발송했습니다.</p>

  <div class="receipt">
    <p class="receipt-label">결제 내역</p>
    <div class="receipt-row"><span>상품명</span><strong>디지털 마에스트로</strong></div>
    <div class="receipt-row"><span>결제 금액</span><strong>200,000원</strong></div>
    <div class="receipt-row"><span>결제 수단</span><strong>신용카드</strong></div>
    <div class="receipt-row"><span>결제 일시</span><strong id="pay-date"></strong></div>
    <div class="receipt-row"><span>주문 번호</span><strong id="order-num"></strong></div>
  </div>

  <div class="info-box">
    <span>📧</span>
    <p>강의 수강 링크는 <strong style="color:var(--gold)">가입 이메일</strong>로 발송되었습니다. 메일이 오지 않으면 스팸함을 확인하거나 고객센터로 문의해주세요.</p>
  </div>

  <a href="/dashboard" class="btn-primary">강의 바로 시작하기 →</a>
  <a href="/" class="btn-secondary">홈으로 돌아가기</a>
</div>

<script>
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('pay-date').textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const rand = String(Math.floor(Math.random()*9000)+1000);
  document.getElementById('order-num').textContent = `DM-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${rand}`;
</script>
</body>
</html>
